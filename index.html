<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ฐานทัพขนมของน้องปากคลอง</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anuphan&display=swap');
    * { box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Anuphan', sans-serif;
      background: #fffbe7;
      margin: 0; padding: 15px;
      display: flex; flex-direction: column; align-items: center;
    }

    h1 { text-align: center; font-size: 1.4rem; }

    #plate {
      width: 80vw; max-width: 350px;
      height: 80vw; max-height: 350px;
      background: url('ฐาน.png') center/contain no-repeat;
      position: relative; border-radius: 50%; margin: 20px 0;
    }

    .snack-img {
      width: 80px; height: 80px;
      background-size: contain; background-repeat: no-repeat;
      position: absolute; cursor: grab;
    }

    .buttons {
      display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 360px;
    }

    button {
      padding: 6px 0;
      width: 32px; height: 32px;
      font-size: 16px;
      border: none; border-radius: 6px;
      background: #ffcdd2;
      cursor: pointer;
    }

    button:hover { background: #ef9a9a; }

    #delete-button {
      background: #e53935; color: white; padding: 6px 14px; margin-top: 10px;
      border-radius: 8px;
    }

    .snack-area {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px; margin-top: 10px;
    }

    .snack-choice {
      width: 70px; height: 70px;
      background-size: contain; background-repeat: no-repeat;
      cursor: grab;
    }
  </style>
</head>
<body>
  <h1>ฐานทัพขนมของน้องปากคลอง🍬</h1>
  <div id="plate" ondragover="event.preventDefault()" ondrop="drop(event)"></div>

  <div class="buttons" id="buttons-container"></div>
  <button id="delete-button">ลบ</button>
  <div class="snack-area" id="snack-area"></div>

  <script>
    const snackImages = {
      A: "A.png", 
      B: "B.png", 
      C: "C.png", 
      D: "D.png", 
      E: "E.png", 
      F: "F.png", 
      G: "G.png", 
      H: "H.png", 
      I: "I.png", 
      J: "J.png", 
      K: "K.png", 
      L: "L.png", 
      M: "M.png", 
      N: "N.png", 
      O: "O.png",
      P: "P.png", 
      Q: "Q.png", 
      R: "R.png", 
      S: "S.png", 
      T: "https://cdn-icons-png.flaticon.com/512/1046/1046803.png", 
      U: "https://cdn-icons-png.flaticon.com/512/1046/1046804.png", 
      V: "https://cdn-icons-png.flaticon.com/512/1046/1046805.png", 
      W: "https://cdn-icons-png.flaticon.com/512/1046/1046806.png", 
      X: "https://cdn-icons-png.flaticon.com/512/1046/1046807.png", 
      Y: "https://cdn-icons-png.flaticon.com/512/1046/1046808.png", 
      Z: "https://cdn-icons-png.flaticon.com/512/1046/1046809.png"
    };

    const buttonsContainer = document.getElementById("buttons-container");
    const snackArea = document.getElementById("snack-area");
    const plate = document.getElementById("plate");
    const deleteButton = document.getElementById("delete-button");
    const snacksOnPlate = [];

    // สร้างปุ่มตัวอักษร
    Object.keys(snackImages).forEach(letter => {
      const btn = document.createElement("button");
      btn.textContent = letter;
      btn.onclick = () => createSnackChoice(letter);
      buttonsContainer.appendChild(btn);
    });

    function createSnackChoice(letter) {
      const img = document.createElement("div");
      img.className = "snack-choice";
      img.style.backgroundImage = `url('${snackImages[letter]}')`;
      img.setAttribute("draggable", true);
      img.dataset.letter = letter;
      img.ondragstart = drag;
      snackArea.appendChild(img);
    }

    function drag(e) {
      e.dataTransfer.setData("letter", e.target.dataset.letter);
      if (e.target.id) {
        e.dataTransfer.setData("id", e.target.id);
      }
    }

    function drop(e) {
      e.preventDefault();
      const letter = e.dataTransfer.getData("letter");
      const existingId = e.dataTransfer.getData("id");

      let snack;
      if (existingId) {
        snack = document.getElementById(existingId);
      } else {
        snack = document.createElement("div");
        snack.className = "snack-img";
        snack.style.backgroundImage = `url('${snackImages[letter]}')`;
        snack.id = "snack-" + Math.random().toString(36).substr(2, 9);
        snack.dataset.letter = letter;
        snack.setAttribute("draggable", true);
        snack.ondragstart = drag;
        plate.appendChild(snack);
        snacksOnPlate.push(snack);
      }

      const plateRect = plate.getBoundingClientRect();
      snack.style.left = (e.clientX - plateRect.left - 40) + "px";
      snack.style.top = (e.clientY - plateRect.top - 40) + "px";
    }

    deleteButton.onclick = () => {
      const last = snacksOnPlate.pop();
      if (last) last.remove();
    };
  </script>
</body>
</html>
